<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="#10b981" stroke-width="1"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#10b981" stroke-width="1"/>
  </g>

  <!-- Decorative routing lines (right side) -->
  <g opacity="0.15">
    <circle cx="950" cy="200" r="4" fill="#10b981"/>
    <circle cx="1050" cy="150" r="3" fill="#059669"/>
    <circle cx="1050" cy="200" r="3" fill="#10b981"/>
    <circle cx="1050" cy="250" r="3" fill="#059669"/>
    <line x1="954" y1="200" x2="1047" y2="150" stroke="#10b981" stroke-width="1.5"/>
    <line x1="954" y1="200" x2="1047" y2="200" stroke="#10b981" stroke-width="2"/>
    <line x1="954" y1="200" x2="1047" y2="250" stroke="#10b981" stroke-width="1.5"/>

    <circle cx="950" cy="420" r="4" fill="#6366f1"/>
    <circle cx="1050" cy="370" r="3" fill="#6366f1"/>
    <circle cx="1050" cy="420" r="3" fill="#6366f1"/>
    <circle cx="1050" cy="470" r="3" fill="#6366f1"/>
    <line x1="954" y1="420" x2="1047" y2="370" stroke="#6366f1" stroke-width="1.5"/>
    <line x1="954" y1="420" x2="1047" y2="420" stroke="#6366f1" stroke-width="2"/>
    <line x1="954" y1="420" x2="1047" y2="470" stroke="#6366f1" stroke-width="1.5"/>
  </g>

  <!-- Green glow top-right -->
  <circle cx="1100" cy="80" r="200" fill="#10b981" opacity="0.04"/>

  <!-- DAC 2026 badge -->
  <rect x="80" y="80" width="160" height="36" rx="18" fill="#052e16" stroke="#166534" stroke-width="1.5"/>
  <text x="160" y="103" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="14" letter-spacing="0.5">DAC 2026</text>

  <!-- Title -->
  <text x="80" y="195" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="56" letter-spacing="-1">HW-Router</text>
  <text x="80" y="260" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="28" letter-spacing="-0.5">Hardware-Aware Routing for</text>
  <text x="80" y="300" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="28" letter-spacing="-0.5">Scalable Multi-LLM Serving</text>

  <!-- Stats row -->
  <!-- Stat 1: Latency -->
  <rect x="80" y="360" width="240" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="100" y="395" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" letter-spacing="1" text-transform="uppercase">LATENCY REDUCTION</text>
  <text x="100" y="434" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="36">3.4x</text>

  <!-- Stat 2: SLO -->
  <rect x="340" y="360" width="240" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="360" y="395" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" letter-spacing="1">SLO ATTAINMENT</text>
  <text x="360" y="434" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="36">97.9%</text>

  <!-- Stat 3: Overhead -->
  <rect x="600" y="360" width="240" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="620" y="395" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13" letter-spacing="1">ROUTING OVERHEAD</text>
  <text x="620" y="434" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="36">&lt;1ms</text>

  <!-- Authors -->
  <text x="80" y="520" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="16">Kabir, Xue, Zheng, Lou</text>

  <!-- Formula -->
  <text x="80" y="560" fill="#475569" font-family="JetBrains Mono, monospace" font-weight="400" font-size="15">S = lambda * Q - (1 - lambda) * C</text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#green)"/>
</svg>
