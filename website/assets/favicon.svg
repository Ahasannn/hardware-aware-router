<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Circuit traces -->
  <line x1="8" y1="32" x2="16" y2="32" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="20" x2="56" y2="20" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="56" y2="32" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="44" x2="56" y2="44" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
  <!-- Router body -->
  <rect x="16" y="16" width="32" height="32" rx="6" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Inner routing symbol: input dot + fan-out arrows -->
  <circle cx="24" cy="32" r="3" fill="#10b981"/>
  <line x1="27" y1="32" x2="38" y2="22" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="32" x2="38" y2="32" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="32" x2="38" y2="42" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <!-- Output dots -->
  <circle cx="40" cy="22" r="2.5" fill="#059669"/>
  <circle cx="40" cy="32" r="2.5" fill="#10b981"/>
  <circle cx="40" cy="42" r="2.5" fill="#059669"/>
  <!-- Highlight glow on the "selected" route (middle) -->
  <circle cx="40" cy="32" r="2.5" fill="#10b981" opacity="0.4">
    <animate attributeName="r" values="2.5;5;2.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
