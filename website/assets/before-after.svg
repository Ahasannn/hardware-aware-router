  <text x="507" y="178" fill="#334155" font-size="13" font-family="'JetBrains Mono',monospace" text-anchor="middle" font-weight="600">&#955;Q &#8722; (1&#8722;&#955;)C</text>

  <line x1="585" y1="164" x2="620" y2="164" stroke="#10b981" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="625" y="146" width="55" height="36" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
